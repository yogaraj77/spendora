<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spendora</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c') no-repeat center/cover;
color:#fff;
min-height:100vh;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
margin-bottom:10px;
}

select{
padding:10px;
border-radius:10px;
border:none;
margin-bottom:20px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.form, .list{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#00ffae;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #444;
}

.category{
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<h1>💰 Spendora</h1>
<p style="margin-bottom:15px;color:#ccc;">Track money. Anywhere. Anytime.</p>

<!-- 🌍 Currency Selector -->
<select id="currency" onchange="changeCurrency()">
<option value="INR">🇮🇳 India (INR)</option>
<option value="USD">🇺🇸 USA (USD)</option>
<option value="EUR">🇪🇺 Europe (EUR)</option>
<option value="GBP">🇬🇧 UK (GBP)</option>
<option value="JPY">🇯🇵 Japan (JPY)</option>
<option value="AUD">🇦🇺 Australia (AUD)</option>
<option value="CAD">🇨🇦 Canada (CAD)</option>
</select>

<!-- 📊 Dashboard -->
<div class="dashboard">
<div class="card"><h3>Income</h3><p id="income"></p></div>
<div class="card"><h3>Expense</h3><p id="expense"></p></div>
<div class="card"><h3>Savings</h3><p id="savings"></p></div>
<div class="card"><h3>Balance</h3><p id="balance"></p></div>
</div>

<!-- ➕ Form -->
<div class="form">
<h3>Add Transaction</h3>

<input id="name" placeholder="Title (Salary, Food)">
<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option>Income</option>
<option>Expense</option>
<option>Savings</option>
</select>

<input id="category" placeholder="Category (Food, Rent, Travel)">

<button onclick="add()">Add Transaction</button>
</div>

<!-- 📋 List -->
<div class="list">
<h3>Recent Activity</h3>
<div id="list"></div>
</div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("finance")) || [];
let currency = localStorage.getItem("currency") || "INR";

/* 💰 Format Currency */
function formatMoney(amount){
return new Intl.NumberFormat(undefined,{
style:'currency',
currency:currency
}).format(amount);
}

/* 🔄 Render */
function render(){
let income=0,expense=0,savings=0;
let list=document.getElementById("list");
list.innerHTML="";

data.forEach(item=>{
if(item.type=="Income") income+=item.amount;
if(item.type=="Expense") expense+=item.amount;
if(item.type=="Savings") savings+=item.amount;

list.innerHTML+=`
<div class="item">
<div>
<b>${item.name}</b>
<div class="category">${item.category}</div>
</div>
<div>${formatMoney(item.amount)}</div>
</div>`;
});

document.getElementById("income").innerText=formatMoney(income);
document.getElementById("expense").innerText=formatMoney(expense);
document.getElementById("savings").innerText=formatMoney(savings);
document.getElementById("balance").innerText=formatMoney(income-expense-savings);

localStorage.setItem("finance",JSON.stringify(data));
document.getElementById("currency").value=currency;
}

/* ➕ Add */
function add(){
let name=document.getElementById("name").value;
let amount=parseInt(document.getElementById("amount").value);
let type=document.getElementById("type").value;
let category=document.getElementById("category").value;

if(!name || !amount) return alert("Fill all fields");

data.unshift({name,amount,type,category});
render();
}

/* 🌍 Change Currency */
function changeCurrency(){
currency=document.getElementById("currency").value;
localStorage.setItem("currency",currency);
render();
}

render();

</script>

</body>
</html>
