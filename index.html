<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage // Premium Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --accent: #2dd4bf;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            animation: fadeIn 1s ease;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            color: var(--accent);
        }

        /* Goal Cards with Images */
        .goals-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .goal-card {
            height: 180px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
        }

        .goal-card:hover { transform: translateY(-5px); }

        .goal-card img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.5);
        }

        /* Glassmorphism Feed */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .btn-add {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover { box-shadow: 0 0 20px rgba(45, 212, 191, 0.4); }

        /* Expense Items */
        .expense-item {
            display: grid;
            grid-template-columns: 50px 1fr auto;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid transparent;
            animation: slideUp 0.5s ease-out forwards;
        }

        .expense-item:hover {
            border-color: var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background: rgba(45, 212, 191, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .details h4 { font-size: 1rem; margin-bottom: 2px; }
        .details p { font-size: 0.8rem; color: var(--text-dim); }
        .amount { font-weight: 700; color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .goals-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">VANTAGE.</div>
            <div id="date-display" style="color: var(--text-dim); font-size: 0.9rem;"></div>
        </header>

        <section class="goals-row">
            <div class="goal-card">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80" alt="Travel">
                <p style="font-size: 0.8rem; text-transform: uppercase;">Savings Goal</p>
                <h3>Maldives 2026</h3>
                <p style="color: var(--accent); font-weight: 600;">$4,200 / $5,000</p>
            </div>
            <div class="goal-card">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80" alt="Tech">
                <p style="font-size: 0.8rem; text-transform: uppercase;">Wishlist</p>
                <h3>MacBook Pro M3</h3>
                <p style="color: var(--accent); font-weight: 600;">$1,800 / $2,499</p>
            </div>
        </section>

        <section class="glass-panel">
            <div class="feed-header">
                <div>
                    <h2 style="font-size: 1.5rem;">Recent Activity</h2>
                    <p id="total-stat" style="color: var(--text-dim); font-size: 0.9rem;">Total Spend: $0.00</p>
                </div>
                <button class="btn-add" onclick="addNewItem()">+ Add Expense</button>
            </div>
            
            <div id="expense-list">
                </div>
        </section>
    </div>

    <script>
        // Core Logic Class
        class VantageApp {
            constructor() {
                this.listElement = document.getElementById('expense-list');
                this.totalElement = document.getElementById('total-stat');
                this.data = JSON.parse(localStorage.getItem('vantage_expenses')) || [];
                
                // One-click Demo Data
                if (this.data.length === 0) {
                    this.data = [
                        { id: 1, name: "Luxury Dining", amount: 145.00, category: "Dining", date: "Oct 24" },
                        { id: 2, name: "Adobe Cloud", amount: 54.99, category: "SaaS", date: "Oct 22" },
                        { id: 3, name: "Uber Black", amount: 32.40, category: "Transport", date: "Oct 20" }
                    ];
                }
                this.render();
                this.updateDate();
            }

            updateDate() {
                const options = { weekday: 'long', month: 'long', day: 'numeric' };
                document.getElementById('date-display').innerText = new Date().toLocaleDateString(undefined, options);
            }

            render() {
                this.listElement.innerHTML = '';
                let total = 0;

                this.data.forEach((item, index) => {
                    total += item.amount;
                    const row = document.createElement('div');
                    row.className = 'expense-item';
                    row.style.animationDelay = `${index * 0.1}s`;
                    
                    row.innerHTML = `
                        <div class="icon-box">◈</div>
                        <div class="details">
                            <h4>${item.name}</h4>
                            <p>${item.category} • ${item.date}</p>
                        </div>
                        <div class="amount">-$${item.amount.toFixed(2)}</div>
                    `;
                    this.listElement.appendChild(row);
                });

                this.totalElement.innerText = `Total Spend: $${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                localStorage.setItem('vantage_expenses', JSON.stringify(this.data));
            }

            addItem(name, amount) {
                const newItem = {
                    id: Date.now(),
                    name: name || "New Purchase",
                    amount: amount || Math.floor(Math.random() * 100) + 10,
                    category: "General",
                    date: "Just now"
                };
                this.data.unshift(newItem);
                this.render();
            }
        }

        // Initialize App
        const app = new VantageApp();

        // One-click Interaction Function
        function addNewItem() {
            const names = ["Coffee", "Netflix", "Gas Station", "Amazon Order", "Gym Membership"];
            const randomName = names[Math.floor(Math.random() * names.length)];
            app.addItem(randomName);
        }
    </script>
</body>
</html>
